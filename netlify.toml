[build]
  functions = "functions"

[context.production.environment]
  DOMAIN = "app.abrevo.co"

[[headers]]
  for = "/*"
  [headers.values]
    X-Custom-Domain = "app.abrevo.co"
[functions]
  node_bundler = "esbuild"
[functions."readmail"]
  schedule = "* * * * *"
  node_bundler = "nft"
[functions."fubsync"]
  schedule = "* * * * *"
  node_bundler = "nft"
[functions."autocall"]
  schedule = "* * * * *"
  node_bundler = "nft"
[functions."healthcheck"]
  schedule = "0 * * * *"
  node_bundler = "nft"
[functions."sendsurvey"]
  schedule = "0 22 * * *"
  node_bundler = "nft"
[functions."followup"]
  schedule = "0 10 * * *"
  node_bundler = "nft"
[functions."appointment-reminder"]
  schedule = "0 14 * * *"
  node_bundler = "nft"
[functions."appointment-reminder-evening"]
  schedule = "0 0 * * *"
  node_bundler = "nft"
[[redirects]]
  from = "/social.html"
  to = "/social.html"
  status = 200
  force = true

# Rosalia Group booking links
[[redirects]]
  from = "/book"
  to = "/booking-rosalia.html"
  status = 302
  force = true

[[redirects]]
  from = "/reschedule"
  to = "/reschedule-rosalia.html"
  status = 302
  force = true

[[redirects]]
