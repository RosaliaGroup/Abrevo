[build]
  functions = "functions"

[context.production.environment]
  DOMAIN = "app.abrevo.co"

[[headers]]
  for = "/*"
  [headers.values]
    X-Custom-Domain = "app.abrevo.co"
[functions]
  node_bundler = "esbuild"
[functions."readmail"]
  schedule = "* * * * *"
  node_bundler = "nft"
[functions."fubsync"]
  schedule = "* * * * *"
  node_bundler = "nft"
[functions."autocall"]
  schedule = "* * * * *"
  node_bundler = "nft"
[functions."healthcheck"]
  schedule = "*/30 * * * *"
  node_bundler = "nft"
[functions."sendsurvey"]
  schedule = "0 22 * * *"
  node_bundler = "nft"
[functions."followup"]
  schedule = "0 10 * * *"
  node_bundler = "nft"
[[redirects]]
  from = "/social.html"
  to = "/social.html"
  status = 200
  force = true

# Rosalia Group booking links
[[redirects]]
  from = "/book"
  to = "/booking-rosalia.html"
  status = 302
  force = true

[[redirects]]
  from = "/reschedule"
  to = "/booking-rosalia.html?type=reschedule"
  status = 302
  force = true

[[redirects]]
  from = "/iron65"
  to = "/booking-form.html"
  status = 302
  force = true

[[redirects]]
  from = "/iron65-reschedule"
  to = "/booking-form.html?type=reschedule"
  status = 302
  force = true

# Mechanical Enterprise booking links
[[redirects]]
  from = "/hvac"
  to = "/booking-form-hvac.html"
  status = 302
  force = true

[[redirects]]
  from = "/hvac-reschedule"
  to = "/booking-form-hvac.html?type=reschedule"
