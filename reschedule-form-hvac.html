<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reschedule HVAC Appointment â€” Mechanical Enterprise</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 16px; padding: 36px 32px; max-width: 480px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; }
    .logo p { color: #666; font-size: 14px; margin-top: 4px; }
    h2 { font-size: 18px; color: #1a1a2e; margin-bottom: 20px; text-align: center; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; margin-top: 16px; }
    input, select { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 15px; color: #1a1a2e; outline: none; transition: border-color 0.2s; background: #fafafa; }
    input:focus, select:focus { border-color: #e63946; background: #fff; }
    .btn { display: block; width: 100%; padding: 14px; background: #e63946; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 24px; transition: background 0.2s; }
    .btn:hover { background: #c62e3a; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: #e63946; font-size: 13px; margin-top: 12px; display: none; }
    .success { display: none; text-align: center; padding: 20px 0; }
    .success h3 { color: #2d6a4f; font-size: 20px; margin-bottom: 8px; }
    .success p { color: #555; font-size: 14px; }
    .checkmark { font-size: 48px; margin-bottom: 12px; }
    .note { font-size: 12px; color: #888; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>âš™ï¸ Mechanical Enterprise</h1>
      <p>Premier HVAC Services | Newark, NJ</p>
    </div>
    <div id="formState">
      <h2>Reschedule Your Appointment</h2>
      <form id="rescheduleForm">
        <label>Full Name *</label>
        <input type="text" id="full_name" placeholder="John Smith" required/>
        <label>Phone Number *</label>
        <input type="tel" id="phone" placeholder="(862) 000-0000" required/>
        <label>Email</label>
        <input type="email" id="email" placeholder="john@example.com"/>
        <label>New Preferred Date *</label>
        <input type="date" id="new_date" required/>
        <label>New Preferred Time *</label>
        <select id="new_time" required>
          <option value="">Select...</option>
          <option>8:00 AM</option><option>9:00 AM</option><option>10:00 AM</option>
          <option>11:00 AM</option><option>12:00 PM</option><option>1:00 PM</option>
          <option>2:00 PM</option><option>3:00 PM</option><option>4:00 PM</option>
          <option>5:00 PM</option><option>6:00 PM</option>
        </select>
        <div class="error" id="formError"></div>
        <button type="submit" class="btn" id="submitBtn">Confirm Reschedule â†’</button>
        <p class="note">Our team will confirm within 1 business hour â€¢ (862) 419-1763</p>
      </form>
    </div>
    <div class="success" id="successState">
      <div class="checkmark">âœ…</div>
      <h3>Appointment Rescheduled!</h3>
      <p>You'll receive a confirmation text shortly.</p>
      <div id="confirmDetails" style="margin-top:16px; background:#f8f8f8; border-radius:8px; padding:16px; text-align:left; font-size:14px;"></div>
    </div>
  </div>
  <script>
    document.getElementById('new_date').min = new Date(Date.now() + 86400000).toISOString().split('T')[0];
    var params = new URLSearchParams(window.location.search);
    if (params.get('phone')) document.getElementById('phone').value = params.get('phone');
    if (params.get('name')) document.getElementById('full_name').value = params.get('name');

    document.getElementById('rescheduleForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var full_name = document.getElementById('full_name').value.trim();
      var phone = document.getElementById('phone').value.trim();
      var email = document.getElementById('email').value.trim();
      var new_date_raw = document.getElementById('new_date').value;
      var new_time = document.getElementById('new_time').value;
      var errEl = document.getElementById('formError');
      errEl.style.display = 'none';

      if (!full_name || !phone || !new_date_raw || !new_time) {
        errEl.textContent = 'Please fill in all required fields.';
        errEl.style.display = 'block';
        return;
      }

      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var parts = new_date_raw.split('-');
      var new_date = months[parseInt(parts[1]) - 1] + ' ' + parseInt(parts[2]) + ' ' + parts[0];

      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Rescheduling...';

      try {
        var res = await fetch('/.netlify/functions/reschedule-hvac', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name, phone, email, new_date, new_time }),
        });
        var data = await res.json();
        if (res.ok && data.success) {
          document.getElementById('formState').style.display = 'none';
          document.getElementById('successState').style.display = 'block';
          document.getElementById('confirmDetails').innerHTML =
            '<div><strong>Name:</strong> ' + full_name + '</div>' +
            '<div><strong>New Date:</strong> ' + new_date + '</div>' +
            '<div><strong>New Time:</strong> ' + new_time + '</div>';
        } else {
          errEl.textContent = data.error || data.message || 'Something went wrong. Call (862) 419-1763.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Confirm Reschedule â†’';
        }
      } catch(err) {
        errEl.textContent = 'Network error. Please try again or call (862) 419-1763.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Confirm Reschedule â†’';
      }
    });
  </script>
</body>
</html>
